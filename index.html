<!DOCTYPE html>
<html lang = "en">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<title>c3</title>
	<meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, minimum-scale=1.0, maximum-scale=1.0" />
	<link rel="stylesheet" href="css/index.css">
</head>
<body>
	<div class="box">
		<!-- 头 -->
		<div class="head">
			<!-- 脸 -->
			<div class="face"></div>
			<!-- 鼻子 -->
			<div class="nose"></div>
			<div class="nose_line"></div>
			<!-- 嘴 -->
			<div class="mouth"></div>
			<div class="mouth_mask"></div>
			<!-- 左胡须 -->
			<div class="whiskers whi_lt rotate20"></div>
			<div class="whiskers whi_l"></div>
			<div class="whiskers whi_lb rotate160"></div>
			<!-- 右胡须 -->
			<div class="whiskers whi_rt rotate160"></div>
			<div class="whiskers whi_r"></div>
			<div class="whiskers whi_rb rotate20"></div>
			<!-- 眼睛 -->
			<div class="eyes">
				<div class="eye eye_left"></div>
				<div class="eyeball eyeball_left"></div>
				<div class="eye eye_right"></div>
				<div class="eyeball eyeball_right"></div>
			</div>
		</div>
		<!-- 项链 -->
		<div class="choker">
			<div class="bell"></div>
			<div class="bell_line"></div>
			<div class="bell_point"></div>
			<div class="bell_line2"></div>
		</div>
		<!-- 身体 -->
		<div class="body">
			<div class="body_circle"></div>
			<div class="body_pocket"></div>
			<div class="body_cirle2"></div>
			
			<!-- 左手 -->
			<div class="hand hand_left"></div>
			<div class="hand_circle hand_left_circle"></div>
			<div class="hand_mask hand_mask_l"></div>

			<!-- 右手 -->
			<div class="hand hand_right"></div>
			<div class="hand_circle hand_right_circle"></div>
			<div class="hand_mask hand_mask_r"></div>

			<!-- 脚 -->
			<div class="foot foot_left"></div>
			<div class="foot foot_right"></div>
		</div>
	</div>
</body>
</html>
